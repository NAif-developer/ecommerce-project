<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="goldBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff2a8"/>
      <stop offset="35%"  stop-color="#f1c40f"/>
      <stop offset="65%"  stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#7a5c00"/>
    </linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="-30" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animate attributeName="x1" from="-30" to="64" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0"   to="94" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="48"
        fill="url(#goldBase)">K</text>
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="48"
        fill="url(#shine)">K</text>
</svg>
